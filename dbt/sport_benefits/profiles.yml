sport_benefits:
  target: local

  outputs:
    local:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST') }}"
      port: "{{ env_var('POSTGRES_HOST_PORT') | int }}"
      user: "{{ env_var('POSTGRES_DBT_USER') }}"
      password: "{{ env_var('POSTGRES_DBT_PASSWORD') }}"
      dbname: "{{ env_var('POSTGRES_DB') }}"
      schema: staging
      threads: 2
