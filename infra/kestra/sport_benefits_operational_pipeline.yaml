id: sport_benefits_operational_pipeline

namespace: sport.data.solution

description: |
  Exécute les scripts opérationnels existants :
  dbt, synchronisation de la file Slack et prévisualisation.

inputs:
  - id: publication_limit
    type: INT
    defaults: 1

tasks:
  - id: run_dbt_script
    type: io.kestra.plugin.scripts.shell.Commands
    description: Exécute le script dbt existant.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      pullPolicy: IF_NOT_PRESENT
      networkMode: sport-data-solution_default
      volumes:
        - /home/vincent_moutia/workspace/oc_projet12:/workspace/oc_projet12
    containerImage: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    commands:
      - |
        set -eu
        cd /workspace/oc_projet12
        export POSTGRES_HOST_OVERRIDE=postgres
        export POSTGRES_HOST_PORT_OVERRIDE=5432
        bash scripts/06_check_and_run_dbt.sh

  - id: run_slack_sync_script
    type: io.kestra.plugin.scripts.shell.Commands
    description: Exécute le script de synchronisation Slack existant.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      pullPolicy: IF_NOT_PRESENT
      volumes:
        - /home/vincent_moutia/workspace/oc_projet12:/workspace/oc_projet12
        - /var/run/docker.sock:/var/run/docker.sock
    containerImage: docker:27-cli
    commands:
      - |
        set -eu
        apk add --no-cache bash >/dev/null

        if ! docker compose version >/dev/null 2>&1; then
          apk add --no-cache docker-cli-compose >/dev/null
        fi

        cd /workspace/oc_projet12
        bash scripts/07_sync_slack_publication_queue.sh

  - id: run_slack_preview_script
    type: io.kestra.plugin.scripts.shell.Commands
    description: Exécute le script existant en mode prévisualisation.
    taskRunner:
      type: io.kestra.plugin.scripts.runner.docker.Docker
      pullPolicy: IF_NOT_PRESENT
      networkMode: sport-data-solution_default
      volumes:
        - /home/vincent_moutia/workspace/oc_projet12:/workspace/oc_projet12
    containerImage: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    commands:
      - |
        set -eu
        cd /workspace/oc_projet12
        export POSTGRES_HOST_OVERRIDE=postgres
        export POSTGRES_HOST_PORT_OVERRIDE=5432
        bash scripts/08_publish_slack_activities.sh \
          --limit {{ inputs.publication_limit }} \
          --dry-run
