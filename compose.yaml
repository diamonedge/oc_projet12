name: sport-data-solution
services:
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin4
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin-data:/var/lib/pgadmin  
  postgres:
    image: postgres:18
    container_name: sport-data-postgres
    restart: unless-stopped
    shm_size: 128mb

    env_file:
      - .env

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"

    ports:
      - "${POSTGRES_HOST}:${POSTGRES_HOST_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql
      - ./infra/postgres-init:/docker-entrypoint-initdb.d:ro

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  superset-init:
    build:
      context: .
      dockerfile: infra/superset/Dockerfile

    image: sport-data-superset:local
    container_name: sport-data-superset-init
    restart: "no"
    init: true

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_HOME: /app/superset_home

      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}

      SUPERSET_METADATA_DB: ${SUPERSET_METADATA_DB}
      SUPERSET_METADATA_USER: ${SUPERSET_METADATA_USER}
      SUPERSET_METADATA_PASSWORD: ${SUPERSET_METADATA_PASSWORD}

      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME}
      SUPERSET_ADMIN_FIRSTNAME: ${SUPERSET_ADMIN_FIRSTNAME}
      SUPERSET_ADMIN_LASTNAME: ${SUPERSET_ADMIN_LASTNAME}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}

    volumes:
      - ./infra/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - superset_home:/app/superset_home

    command:
      - /bin/sh
      - -ec
      - |
        superset db upgrade

        if superset fab list-users | grep -Fq "username:$${SUPERSET_ADMIN_USERNAME} |"; then
          echo "[INFO] Administrateur Superset déjà existant."
        else
          superset fab create-admin --username "$${SUPERSET_ADMIN_USERNAME}" --firstname "$${SUPERSET_ADMIN_FIRSTNAME}" --lastname "$${SUPERSET_ADMIN_LASTNAME}" --email "$${SUPERSET_ADMIN_EMAIL}" --password "$${SUPERSET_ADMIN_PASSWORD}"
        fi

        superset init

  superset:
    build:
      context: .
      dockerfile: infra/superset/Dockerfile

    image: sport-data-superset:local
    container_name: sport-data-superset
    restart: unless-stopped
    init: true

    depends_on:
      superset-init:
        condition: service_completed_successfully

    environment:
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_HOME: /app/superset_home
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY}
      SUPERSET_METADATA_DB: ${SUPERSET_METADATA_DB}
      SUPERSET_METADATA_USER: ${SUPERSET_METADATA_USER}
      SUPERSET_METADATA_PASSWORD: ${SUPERSET_METADATA_PASSWORD}

    ports:
      - "${SUPERSET_HOST_PORT}:8088"

    volumes:
      - ./infra/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
      - superset_home:/app/superset_home

    command:
      - /usr/bin/run-server.sh

volumes:
  postgres_data:
  superset_home:
  pgadmin-data:
